<script>
document.write("<!doctype html>\r\n<html lang=\"en\">\r\n<head>\r\n<meta charset=\"utf-8\"\/>\r\n<meta name=\"viewport\" content=\"width=device-width,initial-scale=1\"\/>\r\n<title>Unified Bulk Scan \u2014 Domains, Hashes & IPs<\/title>\r\n<style>\r\n  :root { --bg:#0f1113; --card:#16181b; --border:#262; --muted:#bfbfbf; --accent:#2ea3ff; --good:#c8f7c5; --warn:#fff0c2; --bad:#ffd6d6; color-scheme: dark; }\r\n  body { font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial; background: var(--bg); color: #eee; margin: 0; padding: 20px; }\r\n  .wrap { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 420px; gap: 18px; align-items: start; }\r\n  .card { background: var(--card); padding: 12px; border-radius: 8px; box-shadow: 0 6px 18px rgba(0,0,0,0.6); }\r\n  h1,h2,h3 { margin: 0 0 12px 0; display:flex; align-items:center; gap:8px; }\r\n  textarea, input, select { width:100%; padding:8px; border-radius:6px; border:1px solid #222; background:#0b0c0d; color:#eee; font-size:14px; box-sizing:border-box; }\r\n  button { background:var(--accent); color:#042; border:none; padding:8px 12px; border-radius:6px; cursor:pointer; }\r\n  .muted { color:var(--muted); font-size:13px; margin-top:6px; }\r\n  .controls { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }\r\n  .summary { padding:10px; margin-top:10px; border-radius:6px; background:#0b0c0d; border:1px solid #222; display:flex; align-items:center; justify-content:space-between; gap:8px; }\r\n  .red { background: linear-gradient(90deg,#3b0b0b22, transparent); border:1px solid #5c1111; color:#ffb3b3; }\r\n  .yellow { background: linear-gradient(90deg,#3b320b22, transparent); border:1px solid #5c4811; color:#ffeaa6; }\r\n  .green { background: linear-gradient(90deg,#0b3b0b22, transparent); border:1px solid #115c11; color:#bff0bf; }\r\n  .invalid { color:#ffcc66; }\r\n  table { width:100%; border-collapse: collapse; margin-top:10px; }\r\n  th, td { padding:8px; border-bottom:1px solid #222; text-align:left; font-size:13px; }\r\n  .widget-iframe { width:35vw; height:100vh; border:none; position:fixed; top:20px; right:0; z-index:9999; }\r\n  .hidden { display:none; }\r\n  .ip-controls { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }\r\n  .small { font-size:12px; color:#264d00; }\r\n  #coloredResultsContainer { margin-top:10px; max-height:320px; overflow:auto; border-radius:6px; padding:8px; border:1px solid #222; }\r\n  .result { padding:8px; margin-bottom:6px; border-radius:4px; background:#0b0c0d; border:1px solid #222; display:flex; justify-content:space-between; gap:8px; align-items:center; }\r\n  .csv-btn { background:#4caf50;color:#022;padding:8px;border-radius:6px;border:none;cursor:pointer; }\r\n  .result.malicious {\r\n    background: linear-gradient(90deg, rgba(255,68,68,0.05), transparent);\r\n    border: 1px solid rgba(255,68,68,0.25);\r\n    color: #ffb3b3;\r\n  }\r\n  .result.highly-malicious {\r\n    background: linear-gradient(90deg, rgba(255,0,0,0.08), transparent);\r\n    border: 1px solid rgba(255,0,0,0.45);\r\n    color: #ffdede;\r\n    font-weight: 600;\r\n    box-shadow: 0 4px 10px rgba(255,0,0,0.06);\r\n  }\r\n\r\n  \/* Added styles used by the enhanced hash UI *\/\r\n  .arrow { cursor:pointer; font-weight:600; margin-right:6px; display:inline-block; width:18px; text-align:center; }\r\n  .details { background:#0b0c0d; }\r\n  .k { display:inline-block; width:160px; color:#9ad; }\r\n  .red-text { color:#ffb3b3; }\r\n  .green-text { color:#bff0bf; }\r\n\r\n  \/* Non-copyable emoji wrapper *\/\r\n  .noncopy { user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; pointer-events: none; }\r\n  \/* Make the big collapse icon obvious *\/\r\n  #toggleHashesBtn { font-size:20px; line-height:1; padding:6px 10px; background:transparent; border:1px solid #222; color:#eee; border-radius:6px; cursor:pointer; }\r\n  #toggleHashesBtn.open { transform: rotate(90deg); }\r\n  \/* ensure arrow\/emoji are visually selectable (cursor) but not copyable *\/\r\n  .emoji { font-weight:700; display:inline-block; margin-right:6px; }\r\n  \/* hide emoji from assistive technologies if decorative *\/\r\n  .emoji[aria-hidden=\"true\"] { pointer-events: none; }\r\n<\/style>\r\n<\/head>\r\n<body>\r\n\r\n<div style=\"max-width:1200px;margin:0 auto 18px;\">\r\n  <h1>Bulk Scanner \u2014 Domains, Hashes & IPs<\/h1>\r\n<\/div>\r\n\r\n<div class=\"wrap\">\r\n  <!-- Left column: reordered to IP -> Hash -> Domain (which also accepts URLs) -->\r\n  <div>\r\n    <!-- IP Scanner (moved to top) -->\r\n    <div class=\"card\">\r\n      <h2>AbuseIPDB \u2014 Bulk IP Scanner<\/h2>\r\n      <textarea id=\"ipTextArea\" rows=\"6\" placeholder=\"Enter IPs, one per line (IPv4)\"><\/textarea>\r\n      <div class=\"muted\">Private IPs will be listed separately and not scanned.<\/div>\r\n\r\n      <div class=\"ip-controls\">\r\n        <button id=\"scanIPsBtn\">Scan IPs<\/button>\r\n        <button id=\"clearIPsBtn\">Clear Results<\/button>\r\n        <button id=\"downloadCSVBtn\" class=\"csv-btn\" disabled>Download CSV<\/button>\r\n        <div style=\"margin-left:auto; display:flex; gap:6px;\">\r\n          <button id=\"filterAllBtn\" class=\"small\">All<\/button>\r\n          <button id=\"filterMaliciousBtn\" class=\"small\">Malicious<\/button>\r\n          <button id=\"filterSafeBtn\" class=\"small\">Safe<\/button>\r\n        <\/div>\r\n      <\/div>\r\n\r\n      <div id=\"privateErroredContainer\" style=\"display:flex;gap:8px;margin-top:10px;\">\r\n        <textarea id=\"privateIPs\" rows=\"3\" placeholder=\"Private IPs (not scanned)\" readonly style=\"width:50%\"><\/textarea>\r\n        <textarea id=\"erroredIPs\" rows=\"3\" placeholder=\"Errored IPs\" readonly style=\"width:50%\"><\/textarea>\r\n      <\/div>\r\n\r\n      <div id=\"coloredResultsContainer\" aria-live=\"polite\"><\/div>\r\n\r\n      <div style=\"margin-top:10px;\">\r\n        <textarea id=\"scanOutput\" rows=\"1\" style=\"width:100%;background:#0b0c0d;border:1px solid #222;color:#eee;padding:8px;\">Copy- Scan results<\/textarea>\r\n      <\/div>\r\n    <\/div>\r\n\r\n    <!-- Hash Scanner -->\r\n    <div class=\"card\" style=\"margin-top:14px;\">\r\n      <div style=\"display:flex; align-items:center; justify-content:space-between;\">\r\n        <h2 style=\"margin:0;\">VirusTotal+MalwareBazaar+AlienVault OTX \u2014 Bulk Hash Scanner<\/h2>\r\n      <\/div>\r\n\r\n      <textarea id=\"hashInput\" rows=\"4\" placeholder=\"Paste text containing MD5\/SHA1\/SHA256 hashes\"><\/textarea>\r\n      <div class=\"muted\">Paste any text with hashes; MD5(32), SHA1(40), SHA256(64) will be extracted and deduplicated.<\/div>\r\n      <div style=\"display:flex;gap:8px;margin-top:10px;align-items:center;\">\r\n        <button id=\"scanHashesBtn\">Scan Hashes<\/button>\r\n        <button id=\"clearHashesBtn\">Clear Results<\/button>\r\n        <label class=\"small\">Delay (ms):\r\n          <input id=\"delayMs\" type=\"number\" value=\"1000\" style=\"width:90px;margin-left:6px\"\/>\r\n        <\/label>\r\n      <\/div><br>\r\n      <!-- Big collapse \/ expand control for all hash details -->\r\n        <div style=\"display:flex; gap:8px; align-items:center;\">\r\n          <button id=\"toggleHashesBtn\" title=\"Collapse \/ Expand all hash details\" aria-pressed=\"false\"><span class=\"emoji noncopy\" aria-hidden=\"true\">\u25b6<\/span><\/button>\r\n        <\/div>\r\n      <table id=\"hashResultsTable\">\r\n        <thead><tr><th>Hash<\/th><th>Verdict<\/th><\/tr><\/thead>\r\n        <tbody id=\"hashResultsBody\"><\/tbody>\r\n      <\/table>\r\n    <\/div>\r\n\r\n    <!-- Domain Scanner (accepts domains and URLs) -->\r\n    <div class=\"card\" style=\"margin-top:14px;\">\r\n      <h2>VirusTotal \u2014 Domain & URL Scanner<\/h2>\r\n      <textarea id=\"domainInput\" rows=\"3\" placeholder=\"Enter domains or URLs, one per line (example.com or https:\/\/example.com\/path)\"><\/textarea>\r\n      <div class=\"muted\">Enter domains (example.com) or full URLs (Checks only existing URLS in VT database)\r\n      <br>Remember to Hide Widget after clicking Show Widget<\/div>\r\n      <div class=\"controls\">\r\n        <button id=\"scanDomainsBtn\">Scan Domains\/URLs<\/button>\r\n        <button id=\"clearDomainBtn\">Clear Results<\/button>\r\n      <\/div>\r\n\r\n      <!-- domain results -->\r\n      <div id=\"domainOutput\"><\/div>\r\n\r\n      <!-- keep a dedicated URL results area (no input here \u2014 results only) -->\r\n      <div id=\"urlOutput\" style=\"margin-top:12px;\"><\/div>\r\n    <\/div>\r\n\r\n  <\/div>\r\n\r\n  <!-- Right column: Settings & status (unchanged) -->\r\n  <div>\r\n    <div class=\"card\">\r\n      <h3>Settings & Worker<\/h3>\r\n      <div class=\"muted\">Set your Worker URL (must end with '\/'). The Worker should inject <code>x-apikey<\/code> for VirusTotal and <code>Key<\/code> for AbuseIPDB.<\/div>\r\n      <input id=\"proxyBase\" value=\"https:\/\/dev-fragrant-mountain-23f4.4r0m41-soc.workers.dev\/\" \/>\r\n      <hr style=\"border-color:#222;margin:12px 0;\"\/>\r\n      <h3>Quick status<\/h3>\r\n      <div id=\"statusBox\" class=\"small\">Ready.<\/div>\r\n      <div style=\"margin-top:10px;\">\r\n        <button id=\"testWorkerBtn\">Test Worker (VT domain example)<\/button>\r\n      <\/div>\r\n    <\/div>\r\n\r\n    <div class=\"card\" style=\"margin-top:14px;\">\r\n      <h3>Notes<\/h3>\r\n      <div class=\"small\">\r\n        \u2022 Add secrets to Worker: <code>VT_API_KEY<\/code> and <code>ABUSEIPDB_KEY<\/code>.<br\/>\r\n        \u2022 Worker must strip client-supplied auth headers and set the appropriate secret header for each API. <br\/>\r\n        \u2022 Rate limits apply \u2014 use delay\/batching for large scans.\r\n      <\/div>\r\n    <\/div>\r\n  <\/div>\r\n<\/div>\r\n\r\n<script>\r\nwindow.onload = function () {\r\n    var _0x1 = window.document;\r\n    var _0x2 = window.localStorage;\r\n    _0x1.cookie = \"QXV0aG9y=SnlvdGhpIFJhaiBW\";\r\n    _0x2.setItem(\"QXV0aG9y\", \"SnlvdGhpIFJhaiBW\");\r\n};\r\n\/* -------------------- Shared config -------------------- *\/\r\nlet PROXY_BASE = '';\r\ndocument.getElementById('proxyBase').addEventListener('input', e => PROXY_BASE = e.target.value.trim());\r\n\r\nfunction setStatus(msg, err=false){\r\n  const s = document.getElementById('statusBox');\r\n  s.textContent = msg;\r\n  s.style.color = err ? '#ffb3b3' : '#bfefff';\r\n}\r\n\r\nfunction buildProxiedUrl(targetUrl){\r\n  if(!PROXY_BASE) throw new Error('PROXY_BASE not set. Please set your Worker URL in the right panel.');\r\n  let base = PROXY_BASE;\r\n  if(!base.endsWith('\/')) base += '\/';\r\n  return base + encodeURIComponent(targetUrl);\r\n}\r\nfunction escapeHtml(s){ if (s===null||s===undefined) return ''; return String(s).replace(\/[&<>\"]\/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[ch])); }\r\nfunction sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }\r\n\r\n\/* ------------------ Copy sanitiser: remove the special emojis from copied text ------------------ *\/\r\ndocument.addEventListener('copy', (ev) => {\r\n  try {\r\n    const sel = window.getSelection();\r\n    if(!sel) return;\r\n    const text = sel.toString();\r\n    \/\/ remove the emojis we made non-copyable\r\n    const cleaned = text.replace(\/[\\u{1F539}\\u{2705}\\u{1F534}\\u{25B6}\\u{25BA}\\u{25B8}\\u{25B7}]\/gu, ''); \/\/ covers \ud83d\udd18 \u2705 \ud83d\udd34 \u25b6 and variants\r\n    \/\/ write cleaned string to clipboard\r\n    ev.clipboardData.setData('text\/plain', cleaned);\r\n    ev.preventDefault();\r\n  } catch(e){\r\n    \/\/ ignore, default copy will happen\r\n  }\r\n});\r\n\r\n\/* ------------------ Helpers ------------------ *\/\r\nfunction toFlagEmoji(countryCode){\r\n  if(!countryCode || typeof countryCode !== 'string') return '';\r\n  const cc = countryCode.toUpperCase();\r\n  if(cc.length !== 2) return cc;\r\n  const base = 0x1F1E6; \/\/ regional indicator symbol letter A\r\n  const first = cc.charCodeAt(0) - 65;\r\n  const second = cc.charCodeAt(1) - 65;\r\n  if(first < 0 || second < 0 || first > 25 || second > 25) return cc;\r\n  return String.fromCodePoint(base + first, base + second);\r\n}\r\n\r\n\/* ------------------ Track scanned domains to avoid duplicates ------------------ *\/\r\nconst scannedDomains = new Set();\r\n\r\n\/* ------------------ Domain+URL scanner (single input) ------------------ *\/\r\nconst domainInput = document.getElementById('domainInput');\r\nconst domainOutput = document.getElementById('domainOutput');\r\nconst urlOutput = document.getElementById('urlOutput');\r\n\r\ndocument.getElementById('scanDomainsBtn').addEventListener('click', ()=> {\r\n  const txt = domainInput.value.trim(); if(!txt){ setStatus('Enter at least one domain or URL', true); return; }\r\n  const lines = txt.split(\/\\r?\\n\/).map(d=>d.trim()).filter(Boolean);\r\n  domainOutput.innerHTML=''; urlOutput.innerHTML=''; PROXY_BASE = document.getElementById('proxyBase').value.trim();\r\n  setStatus('Scanning domains\/URLs...');\r\n  (async ()=>{\r\n    for(const ln of Array.from(new Set(lines))){\r\n      const normalized = normalizeInput(ln);\r\n      \/\/ decide whether URL or domain:\r\n      if(isLikelyUrl(normalized)) {\r\n        \/\/ run URL flow\r\n        await scanURL(normalized).catch(()=>{ \/* errors handled in scanURL *\/ });\r\n      } else {\r\n        \/\/ run domain flow\r\n        await scanDomain(normalized).catch(()=>{ \/* errors handled in scanDomain *\/ });\r\n      }\r\n      \/\/ small throttle\r\n      await sleep(300);\r\n    }\r\n    setStatus('Domain\/URL scanning finished.');\r\n  })();\r\n});\r\ndocument.getElementById('clearDomainBtn').addEventListener('click', ()=> { domainOutput.innerHTML=''; urlOutput.innerHTML=''; scannedDomains.clear(); });\r\n\r\n\/* Normalization rules (unchanged) *\/\r\nfunction normalizeInput(s){\r\n  if(!s) return s;\r\n  let t = String(s).trim();\r\n  if(t.startsWith('<') && t.endsWith('>')) t = t.slice(1,-1).trim();\r\n  if(\/^[a-zA-Z][a-zA-Z0-9+\\-.]*:\\\/\\\/\/.test(t)) {\r\n    return t.replace(\/^[\\s\"'<]+|[\\s\"'>]+$\/g,'');\r\n  }\r\n  if(t.indexOf('\/') !== -1){\r\n    const parts = t.split('\/');\r\n    const host = parts[0];\r\n    const rest = parts.slice(1).join('\/');\r\n    const cleanedHost = cleanHost(host);\r\n    if(rest === '') {\r\n      return cleanedHost;\r\n    } else {\r\n      return cleanedHost + '\/' + rest;\r\n    }\r\n  }\r\n  return cleanHost(t);\r\n}\r\n\r\nfunction cleanHost(h){\r\n  if(!h) return h;\r\n  let c = String(h).trim();\r\n  c = c.replace(\/^[\\.\\-\\_]+\/, '');\r\n  c = c.replace(\/[\\.\\-\\_]+$\/,'');\r\n  c = c.replace(\/^[\\.\\-\\_]+\/, '');\r\n  return c;\r\n}\r\n\r\nfunction isLikelyUrl(s){\r\n  if(!s) return false;\r\n  if(\/^[a-zA-Z][a-zA-Z0-9+\\-.]*:\\\/\\\/\/.test(s)) return true;\r\n  if(\/\\\/.+\/.test(s)) return true;\r\n  if(\/\\?.+=\/.test(s)) return true;\r\n  return false;\r\n}\r\n\r\n\/* ------------------ Domain scanner ------------------ *\/\r\nasync function scanDomain(domain){\r\n  \/\/ dedupe\r\n  if(scannedDomains.has(domain)) return;\r\n  scannedDomains.add(domain);\r\n\r\n  const container = document.createElement('div'); container.className='summary'; container.innerHTML=`<strong>${escapeHtml(domain)}<\/strong> \u2014 checking...`;\r\n  domainOutput.appendChild(container);\r\n  try {\r\n    const vtUrl = `https:\/\/www.virustotal.com\/api\/v3\/domains\/${encodeURIComponent(domain)}`;\r\n    const proxied = buildProxiedUrl(vtUrl);\r\n    const res = await fetch(proxied,{method:'GET', headers:{'Accept':'application\/json'}});\r\n    if(!res.ok){\r\n      const t = await res.text().catch(()=>res.statusText);\r\n      const formatted = formatVTError(res.status, t);\r\n      container.classList.add('red');\r\n      container.innerHTML=`<strong>${escapeHtml(domain)}<\/strong> \u2014 ${escapeHtml(formatted)}`;\r\n      return;\r\n    }\r\n    const data = await res.json();\r\n    const attrs = data.data && data.data.attributes ? data.data.attributes : null;\r\n    if(!attrs){ container.classList.add('red'); container.innerHTML=`<strong>${escapeHtml(domain)}<\/strong> \u2014 Invalid VT response`; return; }\r\n    const stats = attrs.last_analysis_stats || {}; const m = stats.malicious||0, s = stats.suspicious||0, h = stats.harmless||0, total = m+s+h||0;\r\n    const def = domain.replace(\/\\.\/g,'[.]');\r\n    if(m>0){ container.classList.add('red'); container.innerHTML=`<strong>${escapeHtml(def)}<\/strong> \u2014 ${m}\/${total} vendors flagged as malicious.`; }\r\n    else if(s>0){ container.classList.add('yellow'); container.innerHTML=`<strong>${escapeHtml(def)}<\/strong> \u2014 ${s}\/${total} vendors flagged as suspicious.`; }\r\n    else { container.classList.add('green'); container.innerHTML=`<strong>${escapeHtml(def)}<\/strong> \u2014 Not flagged \/ Safe.`; }\r\n    const widgetBtn = document.createElement('button'); widgetBtn.textContent='Show Widget'; widgetBtn.style.marginLeft='8px';\r\n    widgetBtn.addEventListener('click', ()=> toggleWidget(domain, widgetBtn));\r\n    container.appendChild(widgetBtn);\r\n  } catch(err){ container.classList.add('red'); container.innerHTML=`<strong>${escapeHtml(domain)}<\/strong> \u2014 ${escapeHtml(err.message)}`; }\r\n}\r\n\r\n\/* ------------------ Hash scanner (ENHANCED) ------------------ *\/\r\nconst hashInputEl = document.getElementById('hashInput');\r\nconst hashResultsBody = document.getElementById('hashResultsBody');\r\n\r\ndocument.getElementById('clearHashesBtn').addEventListener('click', ()=> hashResultsBody.innerHTML='');\r\n\r\nconst hashCaptureRegex = \/\\b([A-Fa-f0-9]{32}|[A-Fa-f0-9]{40}|[A-Fa-f0-9]{64})\\b\/g;\r\n\r\n\/* paste convenience *\/\r\nhashInputEl.addEventListener('paste', (e)=>{\r\n  try {\r\n    e.preventDefault();\r\n    const text = (e.clipboardData||window.clipboardData).getData('text')||'';\r\n    const matches = text.match(hashCaptureRegex);\r\n    hashInputEl.value = matches ? Array.from(new Set(matches.map(m=>m.toLowerCase()))).join('\\n') : '';\r\n  } catch(err){}\r\n});\r\n\r\ndocument.getElementById('scanHashesBtn').addEventListener('click', async ()=>{\r\n  PROXY_BASE = document.getElementById('proxyBase').value.trim();\r\n  const delay = Math.max(0, parseInt(document.getElementById('delayMs').value||'1000',10));\r\n\r\n  const raw = hashInputEl.value || '';\r\n  const found = raw.match(hashCaptureRegex) || [];\r\n  const hashes = Array.from(new Set(found.map(h=>h.toLowerCase())));\r\n\r\n  if(hashes.length === 0){\r\n    setStatus('No hashes detected to scan.', true);\r\n    return;\r\n  }\r\n\r\n  hashResultsBody.innerHTML = '';\r\n  setStatus(`Scanning ${hashes.length} hashes...`);\r\n\r\n  for(const h of hashes){\r\n\r\n    const row = hashResultsBody.insertRow();\r\n    const c1 = row.insertCell();\r\n    const c2 = row.insertCell();\r\n\r\n    \/\/ arrow is non-copyable emoji\r\n    c1.innerHTML = `<span class=\"arrow\"><span class=\"emoji noncopy\" aria-hidden=\"true\">\u25b6<\/span><\/span>${escapeHtml(h)}`;\r\n    c2.innerHTML = `<div class=\"status\"><span class=\"emoji noncopy\" aria-hidden=\"true\">\ud83d\udd18<\/span> <span class=\"status-text\">Checking\u2026<\/span><\/div>`;\r\n\r\n    const drow = hashResultsBody.insertRow();\r\n    drow.style.display = 'none';\r\n    drow.className = 'details';\r\n    const dc = drow.insertCell();\r\n    dc.colSpan = 2;\r\n\r\n    let vtFound = false, mbFound = false, avFound = false;\r\n\r\n    let vt = { name:'\u2014', label:'\u2014', score:'\u2014', bad:false };\r\n    let mb = { file:'\u2014', tags:'' };\r\n    let av = { pulseCount:0, verdict:'\u2014' };\r\n\r\n    \/* ---------------- VirusTotal ---------------- *\/\r\n    try {\r\n      const vtUrl = buildProxiedUrl(`https:\/\/www.virustotal.com\/api\/v3\/files\/${encodeURIComponent(h)}`);\r\n      const r = await fetch(vtUrl, { method:'GET', headers:{ 'Accept':'application\/json' }});\r\n      if(r.ok){\r\n        const j = await r.json().catch(()=>null);\r\n        const a = j?.data?.attributes;\r\n        if(a){\r\n          vtFound = true;\r\n          const s = a.last_analysis_stats || {};\r\n          const total = Object.values(s).reduce((a,b)=>a+(b||0),0);\r\n          vt = {\r\n            score: `${s.malicious||0}\/${total||0}`,\r\n            label: a.suggested_threat_label || '\u2014',\r\n            name: a.meaningful_name || a.names?.[0] || '\u2014',\r\n            bad: (s.malicious||0) > 0\r\n          };\r\n        }\r\n      }\r\n    } catch(e){}\r\n\r\n    \/* ---------------- MalwareBazaar ---------------- *\/\r\n    try {\r\n      const mbUrl = buildProxiedUrl('https:\/\/mb-api.abuse.ch\/api\/v1\/');\r\n      const r = await fetch(mbUrl, {\r\n        method: 'POST',\r\n        headers: {\r\n          'Content-Type': 'application\/x-www-form-urlencoded',\r\n          'Accept': 'application\/json'\r\n        },\r\n        body: new URLSearchParams({ query:'get_info', hash: h })\r\n      });\r\n\r\n      if(r.ok){\r\n        const j = await r.json().catch(()=>null);\r\n        if(j && j.query_status === 'ok' && Array.isArray(j.data) && j.data.length){\r\n          mbFound = true;\r\n          mb = {\r\n            file: j.data[0].file_name || '\u2014',\r\n            tags: (j.data[0].tags || []).join(', ')\r\n          };\r\n        }\r\n      }\r\n    } catch(e){}\r\n\r\n    \/* ---------------- AlienVault OTX ---------------- *\/\r\n    try {\r\n      const avUrl = buildProxiedUrl(`https:\/\/otx.alienvault.com\/api\/v1\/indicators\/file\/${encodeURIComponent(h)}`);\r\n      const r = await fetch(avUrl, { method:'GET', headers:{ 'Accept':'application\/json' }});\r\n      if(r.ok){\r\n        const j = await r.json().catch(()=>null);\r\n        const pulses = j?.pulse_info?.pulses || [];\r\n        av.pulseCount = pulses.length;\r\n        if(pulses.length > 0) avFound = true;\r\n        if(pulses.length >= 10) av.verdict = 'malicious';\r\n        else if(pulses.length > 0) av.verdict = 'suspicious';\r\n        else av.verdict = 'safe';\r\n      }\r\n    } catch(e){}\r\n\r\n    \/* ---------------- Final Verdict Logic ---------------- *\/\r\n      let malicious = false;\r\n      if (!vtFound && !mbFound && !avFound) malicious = false;\r\n      else if (avFound && av.verdict === 'malicious' && vtFound && !vt.bad && !mbFound) malicious = false;\r\n      else if (vt.bad || mbFound || (avFound && av.verdict === 'malicious')) malicious = true;\r\n      else malicious = false;\r\n\r\n    \/\/ set UI with non-copyable emoji\r\n    let emojiHTML = '';\r\nlet verdictText = '';\r\n\r\nif (!vtFound && !mbFound && !avFound) {\r\n  emojiHTML = '<span class=\"emoji noncopy\" aria-hidden=\"true\">\ud83d\udd18<\/span>';\r\n  verdictText = 'Not found';\r\n} else if (malicious) {\r\n  emojiHTML = '<span class=\"emoji noncopy\" aria-hidden=\"true\">\ud83d\udd34<\/span>';\r\n  verdictText = 'Malicious';\r\n} else {\r\n  emojiHTML = '<span class=\"emoji noncopy\" aria-hidden=\"true\">\u2705<\/span>';\r\n  verdictText = 'Known \/ clean';\r\n}\r\n\r\nc2.innerHTML = `${emojiHTML} <span class=\"status-text\">${verdictText}<\/span>`;\r\n\r\n    c2.className = malicious ? 'red-text' : 'green-text';\r\n\r\n    dc.innerHTML = `\r\n      <div><span class=\"k\">VT name:<\/span>${vtFound?escapeHtml(vt.name):'Not found'}<\/div>\r\n      <div><span class=\"k\">VT label:<\/span>${vtFound?escapeHtml(vt.label):'\u2014'}<\/div>\r\n      <div><span class=\"k\">VT detections:<\/span>${vtFound?escapeHtml(vt.score):'\u2014'}<\/div>\r\n      <hr style=\"border-color:#222\">\r\n      <div><span class=\"k\">MB file:<\/span>${mbFound?escapeHtml(mb.file):'Not found'}<\/div>\r\n      <div><span class=\"k\">MB tags:<\/span>${mbFound?escapeHtml(mb.tags):'\u2014'}<\/div>\r\n      <hr style=\"border-color:#222\">\r\n      <div><span class=\"k\">OTX pulses:<\/span>${avFound?escapeHtml(av.pulseCount):'Not found'}<\/div>\r\n      <div><span class=\"k\">OTX verdict:<\/span>${avFound?escapeHtml(av.verdict):'\u2014'}<\/div>\r\n    `;\r\n\r\n    \/\/ arrow toggle behavior\r\n    const arrowEl = c1.querySelector('.arrow');\r\n    arrowEl.onclick = ()=>{\r\n      const open = drow.style.display === 'table-row';\r\n      drow.style.display = open ? 'none' : 'table-row';\r\n      const sym = open ? '\u25b6' : '\u25bc';\r\n      arrowEl.innerHTML = `<span class=\"emoji noncopy\" aria-hidden=\"true\">${sym}<\/span>`;\r\n    };\r\n\r\n    await sleep(delay);\r\n  }\r\n\r\n  setStatus('Hash scan complete.');\r\n});\r\n\r\n\/* ------------------ Collapse \/ Expand all hash details button ------------------ *\/\r\nconst toggleHashesBtn = document.getElementById('toggleHashesBtn');\r\ntoggleHashesBtn.addEventListener('click', ()=>{\r\n  const details = Array.from(hashResultsBody.querySelectorAll('tr.details'));\r\n  const anyOpen = details.some(r => r.style.display === 'table-row');\r\n  const willOpen = !anyOpen;\r\n  details.forEach(r => r.style.display = willOpen ? 'table-row' : 'none');\r\n  \/\/ update all arrows\r\n  const arrows = Array.from(hashResultsBody.querySelectorAll('.arrow'));\r\n  arrows.forEach(a => {\r\n    const sym = willOpen ? '\u25bc' : '\u25b6';\r\n    a.innerHTML = `<span class=\"emoji noncopy\" aria-hidden=\"true\">${sym}<\/span>`;\r\n  });\r\n  \/\/ update big button visual\r\n  toggleHashesBtn.setAttribute('aria-pressed', String(willOpen));\r\n  toggleHashesBtn.classList.toggle('open', willOpen);\r\n  \/\/ update the emoji shown in the button (keeps it non-copyable)\r\n  toggleHashesBtn.innerHTML = `<span class=\"emoji noncopy\" aria-hidden=\"true\">${willOpen ? '\u25bc' : '\u25b6'}<\/span>`;\r\n});\r\n\r\n\/* ------------------ IP scanner ------------------ *\/\r\nconst ipTextArea = document.getElementById('ipTextArea');\r\nconst privateIPsArea = document.getElementById('privateIPs');\r\nconst erroredIPsArea = document.getElementById('erroredIPs');\r\nconst scanOutput = document.getElementById('scanOutput');\r\nconst coloredResultsContainer = document.getElementById('coloredResultsContainer');\r\nconst downloadCSVBtn = document.getElementById('downloadCSVBtn');\r\n\r\nlet ipScanResults = []; \/\/ array of result objects for CSV and filters\r\n\r\ndocument.getElementById('scanIPsBtn').addEventListener('click', () => {\r\n  const raw = ipTextArea.value.trim();\r\n  if(!raw){ setStatus('Enter at least one IP to scan', true); return; }\r\n  const ips = raw.split(\/\\r?\\n\/).map(s=>s.trim()).filter(Boolean);\r\n  PROXY_BASE = document.getElementById('proxyBase').value.trim();\r\n  privateIPsArea.value = ''; erroredIPsArea.value=''; scanOutput.value=''; coloredResultsContainer.innerHTML=''; ipScanResults=[];\r\n  downloadCSVBtn.disabled=true;\r\n  setStatus(`Scanning ${ips.length} IP(s)...`);\r\n  (async ()=> {\r\n    for(const ip of ips){ await processIP(ip); }\r\n    setStatus('IP scanning done.');\r\n    downloadCSVBtn.disabled = ipScanResults.length === 0;\r\n  })();\r\n});\r\n\r\ndocument.getElementById('clearIPsBtn').addEventListener('click', ()=> {\r\n  ipTextArea.value=''; privateIPsArea.value=''; erroredIPsArea.value=''; scanOutput.value=''; coloredResultsContainer.innerHTML=''; ipScanResults=[]; downloadCSVBtn.disabled=true;\r\n});\r\n\r\ndocument.getElementById('filterAllBtn').addEventListener('click', ()=> filterIPResults('all'));\r\ndocument.getElementById('filterMaliciousBtn').addEventListener('click', ()=> filterIPResults('malicious'));\r\ndocument.getElementById('filterSafeBtn').addEventListener('click', ()=> filterIPResults('safe'));\r\n\r\nfunction filterIPResults(mode){\r\n  const children = Array.from(coloredResultsContainer.children);\r\n  children.forEach(el => {\r\n    const cls = el.dataset.cat || '';\r\n    if(mode==='all') el.style.display='flex';\r\n    else if(mode==='malicious') el.style.display = (cls==='maliciousmalicious' || cls==='highly-malicious') ? 'flex' : 'none';\r\n    else if(mode==='safe') el.style.display = (cls==='safe') ? 'flex' : 'none';\r\n  });\r\n}\r\n\r\n\/* CSV escaping per RFC4180 *\/\r\nfunction csvEscape(val){\r\n  if(val===null || val===undefined) return '';\r\n  const s = String(val);\r\n  if(\/[,\"\\r\\n]\/.test(s)){\r\n    return '\"' + s.replace(\/\"\/g,'\"\"') + '\"';\r\n  }\r\n  return s;\r\n}\r\n\r\ndownloadCSVBtn.addEventListener('click', ()=> {\r\n  if(!ipScanResults || ipScanResults.length===0) return;\r\n  const header = ['ipAddress','totalReports','abuseConfidenceScore','countryCode','isp','domain','hostname','usageType'];\r\n  const rows = ipScanResults.map(r => header.map(col => csvEscape(r[col]||'')).join(','));\r\n  const csv = [header.join(','), ...rows].join('\\r\\n');\r\n  const blob = new Blob([csv], { type:'text\/csv;charset=utf-8;' });\r\n  const link = document.createElement('a');\r\n  link.href = URL.createObjectURL(blob);\r\n  link.download = `${new Date().toISOString().split('T')[0]}_abuseipdb_scan.csv`;\r\n  link.click();\r\n});\r\n\r\n\/* IP helpers *\/\r\nfunction isPrivateIP(ip){\r\n  return \/^(10\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|192\\.168\\.\\d{1,3}\\.\\d{1,3}|172\\.(1[6-9]|2[0-9]|3[0-1])\\.\\d{1,3}\\.\\d{1,3})$\/.test(ip);\r\n}\r\n\r\nasync function processIP(ip){\r\n  if(isPrivateIP(ip)){\r\n    privateIPsArea.value += ip + '\\n';\r\n    return;\r\n  }\r\n  try {\r\n    const res = await checkIP(ip);\r\n    scanOutput.value += res.text + '\\n';\r\n    \/\/ Show country flag instead of raw code\r\n    const flag = res.data?.countryCode ? toFlagEmoji(res.data.countryCode) : '';\r\n    const div = document.createElement('div');\r\n    div.className = 'result ' + res.className;\r\n    div.dataset.cat = res.className;\r\n    div.innerHTML = `<div style=\"flex:1\">${escapeHtml(res.text)}<\/div><div class=\"small\" title=\"${escapeHtml(res.data?.countryCode||'')}\">${flag}<\/div>`;\r\n    coloredResultsContainer.appendChild(div);\r\n    if(res.data){\r\n      ipScanResults.push({\r\n        ipAddress: res.data.ipAddress||ip,\r\n        totalReports: res.data.totalReports||0,\r\n        abuseConfidenceScore: res.data.abuseConfidenceScore||0,\r\n        countryCode: res.data.countryCode||'',\r\n        isp: res.data.isp||'',\r\n        domain: res.data.domain||'',\r\n        hostname: res.data.hostname||'',\r\n        usageType: res.data.usageType||'',\r\n      });\r\n    } else {\r\n      ipScanResults.push({\r\n        ipAddress: ip, totalReports:'', abuseConfidenceScore:'', countryCode:'', isp:'', domain:'', hostname:'', usageType:''\r\n      });\r\n      erroredIPsArea.value += ip + '\\n';\r\n    }\r\n  } catch(err){\r\n    erroredIPsArea.value += ip + '\\n';\r\n    scanOutput.value += `IP: ${ip} - Error: ${err.message}\\n`;\r\n  }\r\n}\r\n\r\n\/* network call to AbuseIPDB via Worker proxy (no client key) *\/\r\nasync function checkIP(ip){\r\n  const apiUrl = `https:\/\/api.abuseipdb.com\/api\/v2\/check?ipAddress=${encodeURIComponent(ip)}`;\r\n  const proxied = buildProxiedUrl(apiUrl);\r\n  try {\r\n    const response = await fetch(proxied, { method:'GET', headers: { 'Accept':'application\/json' }});\r\n    if(!response.ok){\r\n      return { text: `IP: ${ip} - Error: ${response.status} ${response.statusText}`, className:'invalid', data:null };\r\n    }\r\n    const data = await response.json();\r\n    const d = data.data || null;\r\n    if(!d) return { text: `IP: ${ip} - Invalid response`, className:'invalid', data:null };\r\n    const { ipAddress, abuseConfidenceScore, totalReports, countryCode, isp } = d;\r\n    if(abuseConfidenceScore >= 80){\r\n      return { text:`The IP ${ipAddress} is highly malicious (Confidence: ${abuseConfidenceScore}%, Reports: ${totalReports}, ISP: ${isp}, ${countryCode})`, className:'highly-malicious', data:d };\r\n    } else if(abuseConfidenceScore >= 5){\r\n      return { text:`The IP ${ipAddress} is malicious (Confidence: ${abuseConfidenceScore}%, Reports: ${totalReports}, ISP: ${isp}, ${countryCode})`, className:'malicious', data:d };\r\n    } else {\r\n      return { text:`The IP ${ipAddress} is safe and it belongs to ISP ${isp}, ${countryCode} `, className:'safe', data:d };\r\n    }\r\n  } catch(err){\r\n    return { text: `IP: ${ip} - Error: ${err.message}`, className:'invalid', data:null };\r\n  }\r\n}\r\n\r\n\/* ------------------ URL scanner (reused: results-only area) ------------------ *\/\r\n\/\/ REPLACE the old scanURL() with this function\r\nasync function scanURL(url){\r\n  const container = document.createElement('div');\r\n  container.className = 'summary';\r\n  container.innerHTML = `<strong>${escapeHtml(url)}<\/strong> \u2014 checking...`;\r\n  urlOutput.appendChild(container);\r\n\r\n  \/\/ Track basic URL verdict info\r\n  let urlFound = false;\r\n  let urlMalicious = false;\r\n  let urlSuspicious = false;\r\n  let urlTotals = 0;\r\n\r\n  try {\r\n    \/\/ Step 1: POST the URL to VT to create an analysis\r\n    const vtPostUrl = `https:\/\/www.virustotal.com\/api\/v3\/urls`;\r\n    const proxiedPostUrl = buildProxiedUrl(vtPostUrl);\r\n\r\n    const postRes = await fetch(proxiedPostUrl, {\r\n      method: 'POST',\r\n      headers: { 'Accept':'application\/json', 'Content-Type':'application\/x-www-form-urlencoded' },\r\n      body: new URLSearchParams({ url: url })\r\n    });\r\n\r\n    if (postRes.ok) {\r\n      const postJson = await postRes.json().catch(()=>null);\r\n      const analysisId = postJson?.data?.id;\r\n      if (analysisId) {\r\n        \/\/ Poll the analysis until completed (or timeout)\r\n        const vtAnalysisUrl = `https:\/\/www.virustotal.com\/api\/v3\/analyses\/${analysisId}`;\r\n        const proxiedAnalysisUrl = buildProxiedUrl(vtAnalysisUrl);\r\n        const maxTries = 8;\r\n        for (let i=0;i<maxTries;i++){\r\n          const getRes = await fetch(proxiedAnalysisUrl, { method:'GET', headers:{ 'Accept':'application\/json' }});\r\n          if(!getRes.ok){\r\n            \/\/ if fetch fails, break and treat as not-found for URL (we'll check domain later)\r\n            break;\r\n          }\r\n          const j = await getRes.json().catch(()=>null);\r\n          const status = j?.data?.attributes?.status;\r\n          if (status === 'completed') {\r\n            const stats = j.data.attributes.stats || {};\r\n            const m = stats.malicious || 0;\r\n            const s = stats.suspicious || 0;\r\n            const h = stats.harmless || 0;\r\n            urlFound = true;\r\n            urlMalicious = m > 0;\r\n            urlSuspicious = s > 0;\r\n            urlTotals = m + s + h;\r\n            break;\r\n          }\r\n          await sleep(700);\r\n        }\r\n      }\r\n    } else {\r\n      \/\/ non-OK POST: preserve for diagnostics (we will still attempt domain if URL not malicious)\r\n      \/\/ optional: you could read error body here if you want to display error for URL\r\n    }\r\n  } catch (e) {\r\n    \/\/ network\/other: ignore here and continue to domain path if appropriate\r\n    console.debug('scanURL: URL analysis error', e);\r\n  }\r\n\r\n  \/\/ If URL is malicious -> show URL malicious and skip domain entirely\r\n  const defanged = url.replace(\/\\.\/g,'[.]');\r\n  if (urlMalicious) {\r\n    container.classList.add('red');\r\n    container.innerHTML = `<strong>${escapeHtml(defanged)}<\/strong> \u2014 \ud83d\udd34 Malicious (URL verdict)`;\r\n    \/\/ (Do not check domain per your requirement)\r\n    return;\r\n  }\r\n\r\n  \/\/ If URL is safe or not found -> extract domain and check it\r\n  let domain = null;\r\n  try { domain = extractHostPrefer(url); } catch(e){ domain = null; }\r\n\r\n  if (!domain) {\r\n    \/\/ No parseable host: show URL verdict (safe\/not found)\r\n    if (urlFound) {\r\n      if (urlSuspicious) {\r\n        container.classList.add('yellow');\r\n        container.innerHTML = `<strong>${escapeHtml(defanged)}<\/strong> \u2014 Suspicious`;\r\n      } else {\r\n        container.classList.add('green');\r\n        container.innerHTML = `<strong>${escapeHtml(defanged)}<\/strong> \u2014 Not flagged \/ Safe`;\r\n      }\r\n    } else {\r\n      \/\/ URL not found and no domain \u2014 show \"Not found\" visually (\ud83d\udd18) but don't perform domain checks\r\n      container.classList.add('yellow');\r\n      container.innerHTML = `<strong>${escapeHtml(defanged)}<\/strong> \u2014 \ud83d\udd18 Not found`;\r\n    }\r\n    return;\r\n  }\r\n\r\n  \/\/ Query domain only when URL wasn't malicious\r\n  let domainMalicious = false;\r\n  try {\r\n    const vtDomainUrl = buildProxiedUrl(`https:\/\/www.virustotal.com\/api\/v3\/domains\/${encodeURIComponent(domain)}`);\r\n    const res = await fetch(vtDomainUrl, { method:'GET', headers:{ 'Accept':'application\/json' }});\r\n    if (res.ok) {\r\n      const data = await res.json().catch(()=>null);\r\n      const stats = data?.data?.attributes?.last_analysis_stats || {};\r\n      const m = stats.malicious || 0;\r\n      const s = stats.suspicious || 0;\r\n      const h = stats.harmless || 0;\r\n      domainMalicious = m > 0;\r\n      \/\/ If domain malicious, update the same URL container to reflect domain verdict\r\n      if (domainMalicious) {\r\n        container.classList.remove('yellow','green');\r\n        container.classList.add('red');\r\n        container.innerHTML = `<strong>${escapeHtml(defanged)}<\/strong> \u2014 \ud83d\udd34 Malicious (Domain verdict)`;\r\n        \/\/ Attach the domain widget to the same URL result (no separate domain result)\r\n        const widgetBtn = document.createElement('button');\r\n        widgetBtn.textContent = 'Show Domain Widget';\r\n        widgetBtn.style.marginLeft = '8px';\r\n        widgetBtn.onclick = () => toggleWidget(domain, widgetBtn);\r\n        container.appendChild(widgetBtn);\r\n        return;\r\n      } else {\r\n        \/\/ Domain not malicious \u2014 leave URL verdict (safe\/not found) as-is, do not create a separate domain element\r\n        if (urlFound) {\r\n          if (urlSuspicious) {\r\n            container.classList.add('yellow');\r\n            container.innerHTML = `<strong>${escapeHtml(defanged)}<\/strong> \u2014 Suspicious`;\r\n          } else {\r\n            container.classList.add('green');\r\n            container.innerHTML = `<strong>${escapeHtml(defanged)}<\/strong> \u2014 Not flagged \/ Safe`;\r\n          }\r\n        } else {\r\n          container.classList.add('green');\r\n          container.innerHTML = `<strong>${escapeHtml(defanged)}<\/strong> \u2014 Not flagged \/ Safe`;\r\n        }\r\n        return;\r\n      }\r\n    } else {\r\n      \/\/ Domain query failed: just show URL verdict (prefer safe presentation)\r\n      if (urlFound) {\r\n        if (urlSuspicious) {\r\n          container.classList.add('yellow');\r\n          container.innerHTML = `<strong>${escapeHtml(defanged)}<\/strong> \u2014 Suspicious`;\r\n        } else {\r\n          container.classList.add('green');\r\n          container.innerHTML = `<strong>${escapeHtml(defanged)}<\/strong> \u2014 Not flagged \/ Safe`;\r\n        }\r\n      } else {\r\n        container.classList.add('yellow');\r\n        container.innerHTML = `<strong>${escapeHtml(defanged)}<\/strong> \u2014 \ud83d\udd18 Not found`;\r\n      }\r\n      return;\r\n    }\r\n  } catch (e) {\r\n    \/\/ On error checking domain: fall back to URL verdict\r\n    if (urlFound) {\r\n      if (urlSuspicious) {\r\n        container.classList.add('yellow');\r\n        container.innerHTML = `<strong>${escapeHtml(defanged)}<\/strong> \u2014 Suspicious`;\r\n      } else {\r\n        container.classList.add('green');\r\n        container.innerHTML = `<strong>${escapeHtml(defanged)}<\/strong> \u2014 Not flagged \/ Safe`;\r\n      }\r\n    } else {\r\n      container.classList.add('yellow');\r\n      container.innerHTML = `<strong>${escapeHtml(defanged)}<\/strong> \u2014 \ud83d\udd18 Not found`;\r\n    }\r\n    return;\r\n  }\r\n}\r\n\r\n\r\n\r\n\/\/ extract host helper (unchanged)\r\nfunction extractHostPrefer(s){\r\n  if(!s) return null;\r\n  try{\r\n    let parsed;\r\n    if(\/^[a-zA-Z][a-zA-Z0-9+\\-.]*:\\\/\\\/\/.test(s)) parsed = new URL(s);\r\n    else parsed = new URL('http:\/\/'+s);\r\n    let host = parsed.hostname || null;\r\n    if(host) host = cleanHost(host);\r\n    return host;\r\n  } catch(e){\r\n    const parts = s.split('\/');\r\n    if(parts.length>0) return cleanHost(parts[0]);\r\n    return null;\r\n  }\r\n}\r\n\r\n\/* ------------------ Widget loader (reused) ------------------ *\/\r\nasync function toggleWidget(domain, button){\r\n  const iframeId = 'vt-widget-' + encodeURIComponent(domain);\r\n  const existing = document.getElementById(iframeId);\r\n  if(existing){ const hidden = existing.style.display === 'none'; existing.style.display = hidden ? 'block' : 'none'; button.textContent = hidden ? 'Hide Widget' : 'Show Widget'; return; }\r\n  try {\r\n    const tokenUrl = `https:\/\/www.virustotal.com\/api\/v3\/widget\/url?query=${encodeURIComponent(domain)}`;\r\n    const proxiedTokenUrl = buildProxiedUrl(tokenUrl);\r\n    const tRes = await fetch(proxiedTokenUrl, { method:'GET', headers:{ 'Accept':'application\/json' }});\r\n    if(!tRes.ok) throw new Error('Token request failed: ' + tRes.status);\r\n    const tJson = await tRes.json();\r\n    const remoteUrl = tJson?.data?.url; if(!remoteUrl) throw new Error('No token returned');\r\n    const token = remoteUrl.split('\/ui\/widget\/html\/')[1]; if(!token) throw new Error('Bad token format');\r\n    const widgetHtmlUrl = `https:\/\/www.virustotal.com\/ui\/widget\/html\/${token}`;\r\n    const proxiedHtml = buildProxiedUrl(widgetHtmlUrl);\r\n    const wRes = await fetch(proxiedHtml, { method:'GET', headers:{ 'Accept':'text\/html' }});\r\n    if(!wRes.ok) throw new Error('Widget HTML fetch failed: ' + wRes.status);\r\n    const widgetHtml = await wRes.text();\r\n    const iframe = document.createElement('iframe'); iframe.id=iframeId; iframe.className='widget-iframe'; iframe.srcdoc = widgetHtml; document.body.appendChild(iframe);\r\n    button.textContent='Hide Widget';\r\n  } catch(err){\r\n    alert('Widget error: ' + err.message);\r\n  }\r\n}\r\n\r\n\/* ------------------ Worker test ------------------ *\/\r\ndocument.getElementById('testWorkerBtn').addEventListener('click', async ()=>{\r\n  PROXY_BASE = document.getElementById('proxyBase').value.trim();\r\n  if(!PROXY_BASE) return setStatus('Set PROXY_BASE first', true);\r\n  setStatus('Testing worker with virustotal.com domain example...');\r\n  try {\r\n    const vtUrl = 'https:\/\/www.virustotal.com\/api\/v3\/domains\/example.com';\r\n    const proxied = buildProxiedUrl(vtUrl);\r\n    const res = await fetch(proxied,{method:'GET', headers:{'Accept':'application\/json'}});\r\n    if(!res.ok){ setStatus(`Worker test failed: ${res.status}`, true); console.error(await res.text().catch(()=>res.statusText)); return; }\r\n    setStatus('Worker test succeeded (VT domain fetch returned 200).');\r\n  } catch(err){ setStatus('Worker test error: ' + err.message, true); }\r\n});\r\n\r\n\/* initial sync *\/\r\nPROXY_BASE = document.getElementById('proxyBase').value.trim();\r\nsetStatus('Ready.');\r\n<\/script>\r\n\r\n<\/body>\r\n<\/html>");
